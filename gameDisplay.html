<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="Assets/favico/favicon_io/android-chrome-512x512.png">
    <title>Document</title>

    <style>
        body {
            width: 100vw;
            height: 100vh;
            background-color: transparent;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }

        .cam-overlay {
            position: absolute;
            bottom: 0;
            z-index: 99999;
            width: 100vw;
            height: 100vh;
            background-color: transparent;
        }

        .team-cam {
            width: 26.5%;
            height: 26.5%;
            /* background-color: blue; */
            position: absolute;
            bottom: 0;
        }

        #blue-team-cam {
            background-color: blue;
            left: 0;

        }

        #red-team-cam {
            background-color: red;
            right: 0;
        }

        .game-overlay {
            width: 100vw;
            height: 100vh;
            background-color: transparent;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 9999;
        }

        .game-overlay img {
            width: 100%;
            height: 100%;
        }
    </style>
</head>

<body style="width: 100vw; height: 100vh; background-color: transparent; margin: 0; padding: 0;">
    <div class="game-overlay">
        <img src="Assets/gameProper/image.png" alt="">
    </div>
    <div class="cam-overlay">
        <div class="team-cam" id="blue-team-cam">

        </div>
        <div class="team-cam" id="red-team-cam">

        </div>
    </div>
</body>

</html>
